<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Counter</title>
</head>
<body>

<h1 id="counter" style="background-color: aquamarine;" >0</h1>

<script>
let count = 0;

setInterval(function() {
    count++;
    document.getElementById("counter").innerText = count;
}, 2000); // 2000 ms = 2 seconds
</script>

</body>
</html>
</body>
</html>
