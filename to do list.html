<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
    <style>
        #su{
             background-color:rgb(228, 227, 227);
      padding: 5px;
      margin: 5px;
      border-radius: 20px;
      box-shadow: 2px;
      width: 450px;
      height: 180px;

    }
    h2{
        text-align: center;
    }
    select{
        background-color: rgb(192, 187, 187);
        
    }
    #addBtn{
        background-color: rgb(135, 135, 211);
    }
        
    </style>
</head>
<body>
<div id="su">
<h2>TODO List</h2>

<input type="text" id="taskInput" placeholder="What needs to be done ?">
<button id="addBtn">Add Task</button>
<div>
  <ul id="doinglist"></ul>
</div>
<div>
  <ul id="donelist">
   
  </ul>
</div>

<ul id="taskList"></ul>
<select>
    <option>All</option>
    <option>Complete</option>
    <option>pending</option>
</select>

<script>
let addBtn = document.getElementById("addBtn");
let taskInput = document.getElementById("taskInput");
let taskList = document.getElementById("taskList");

addBtn.addEventListener("click", function () {
    let taskText = taskInput.value;

    if (taskText === "") {
        alert("Enter a task first!");
        return;
    }

    // Create list item
    let li = document.createElement("li");
    let doinglist= document.getElementById("doinglist");
    let donelist= document.getElementById("donelist")

    // Checkbox
    let checkbox = document.createElement("input");
    checkbox.type = "checkbox";

    checkbox.addEventListener("change", function () {
        if (this.checked) {
            li.style.textDecoration = "line-through";
            donelist.appendChild(li);
        } else {1

            li.style.textDecoration = "none";
            doinglist.appendChild(li);
        }
    });

    // Text
    let text = document.createTextNode(" " + taskText);

    // Delete button
    let deleteBtn = document.createElement("button");
    deleteBtn.innerText = "Delete";

    deleteBtn.addEventListener("click", function () {
        taskList.removeChild(li);
    });

    // Append all
    doinglist.appendChild(checkbox);
    doinglist.appendChild(text);
    doinglist.appendChild(deleteBtn);

    doinglist.appendChild(li);

    taskInput.value = "";
});
</script>
</div>
</body>
</html>
